<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Student Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button:hover { background-color: #1d4ed8; }
        .site-buttons { display: none; margin-top: 20px; }
        .site-btn { background-color: #10b981; }
        .site-btn:hover { background-color: #059669; }
    </style>
</head>
<body>

<div class="container">
    <h2>Welcome to the Portal</h2>
    
    <!-- Step 1: Login Form -->
    <div id="login-section">
        <p>Please enter your email to continue:</p>
        <input type="email" id="email-input" placeholder="student@example.com" required>
        <button onclick="handleLogin()">Sign In</button>
    </div>

    <!-- Step 2: Site Selection (Hidden initially) -->
    <div id="site-selection" class="site-buttons">
        <p>Login successful! Where would you like to go?</p>
        <!-- The links to your existing GitHub Pages -->
        <button class="site-btn" onclick="redirectToSite('https://willdiake3-creator.github.io/telc-2.0/')">Go to Telc 2.0</button>
        <button class="site-btn" onclick="redirectToSite('https://willdiake3-creator.github.io/telc-2-3.0-/')">Go to Telc 2-3.0</button>
    </div>
</div>

<script>
    function handleLogin() {
        const email = document.getElementById('email-input').value;
        if (email) {
            // Store the email in localStorage so the destination sites know who logged in
            localStorage.setItem('userEmail', email);
            
            // Hide login, show the choices
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('site-selection').style.display = 'block';
        } else {
            alert("Please enter an email address.");
        }
    }

    function redirectToSite(url) {
        // Redirect the user to the chosen site
        window.location.href = url;
    }
</script>

</body>
</html>
